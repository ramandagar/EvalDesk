name: "EvalDesk"
description: "Run an EvalDesk evaluation and gate the build on pass-rate / regressions."
author: "EvalDesk"
branding:
  icon: "check-circle"
  color: "green"
inputs:
  base_url:
    description: "EvalDesk API base URL (e.g. https://app.evaldesk.dev)"
    required: true
  token:
    description: "EvalDesk session token / API key"
    required: true
  org:
    description: "Organization id"
    required: true
  project_id:
    description: "Project to run"
    required: true
  min_pass_rate:
    description: "Fail the build below this pass rate (0..1)"
    required: false
  max_failures:
    description: "Fail the build above this many failing cases"
    required: false
outputs:
  run_id:
    description: "The created run id"
  status:
    description: "Terminal run status"
  pass_rate:
    description: "Pass rate (0..1)"
  gate_passed:
    description: "Whether the gate passed"
runs:
  using: "node20"
  main: "index.mjs"
